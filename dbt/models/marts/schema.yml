version: 2

models:
  - name: dim_drivers
    columns:
      - name: driver_id
        tests:
          - not_null
          - unique

  - name: dim_circuits
    columns:
      - name: circuit_id
        tests:
          - not_null
          - unique
      - name: length_km
        tests:
          - not_null
      - name: corners
        tests:
          - not_null

  - name: dim_constructors
    columns:
      - name: constructor_id
        tests:
          - not_null
          - unique

  - name: dim_sessions
    columns:
      - name: session_key
        tests:
          - not_null
          - unique
      - name: circuit_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_circuits')
                field: circuit_id
      - name: race_name
        tests:
          - not_null
      - name: season
        tests:
          - not_null
      - name: round
        tests:
          - not_null
    tests:
      - elementary.volume_anomalies:
          time_bucket:
            period: day
            count: 7
          anomaly_direction: drop

  - name: fact_race_results
    columns:
      - name: jolpica_driver_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_drivers')
                field: driver_id
      - name: constructor_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_constructors')
                field: constructor_id
      - name: season
        tests:
          - not_null
      - name: round
        tests:
          - not_null
      - name: points
        tests:
          - not_null

  - name: fact_qualifying
    columns:
      - name: driver_id
        tests:
          - not_null
      - name: season
        tests:
          - not_null
      - name: round
        tests:
          - not_null

  - name: fact_sprint_results
    columns:
      - name: driver_id
        tests:
          - not_null
      - name: season
        tests:
          - not_null
      - name: round
        tests:
          - not_null

  - name: fact_laps
    columns:
      - name: driver_id
        tests:
          - not_null
      - name: lap_number
        tests:
          - not_null
      - name: lap_time_ms
        tests:
          - not_null

  - name: mart_lap_telemetry
    meta:
      elementary:
        timestamp_column: date
    columns:
      - name: session_key
        tests:
          - not_null
      - name: driver_number
        tests:
          - not_null
      - name: lap_number
        tests:
          - not_null
    tests:
      - elementary.volume_anomalies:
          time_bucket:
            period: day
            count: 1

  - name: mart_qualifying_summary
    meta:
      elementary:
        timestamp_column: qualifying_date
    columns:
      - name: driver_id
        tests:
          - not_null
      - name: season
        tests:
          - not_null
      - name: round
        tests:
          - not_null
      - name: best_source_match
        tests:
          - accepted_values:
              arguments:
                values: ['matched', 'jolpica_only', 'mismatch']
          - elementary.column_anomalies:
              column_anomalies:
                - null_count
                - null_percent
    tests:
      - elementary.volume_anomalies:
          time_bucket:
            period: day
            count: 1
